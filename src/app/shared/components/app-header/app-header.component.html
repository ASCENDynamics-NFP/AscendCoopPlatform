<ion-toolbar>
  <ion-buttons slot="start" class="toolbar-buttons">
    @if (!hideMenu) {
      <ion-menu-button color="primary" menu="main"></ion-menu-button>
    }
    @if (defaultHref) {
      <ion-back-button
        color="primary"
        [defaultHref]="defaultHref"
      ></ion-back-button>
    }
    <!-- Custom start content projection -->
    <ng-content select="[header-start]"></ng-content>
  </ion-buttons>
  <div class="toolbar-content">
    @if (showLogo) {
      <img
        [src]="(logoUrl$ | async) || 'assets/icon/logo.png'"
        alt="ASCENDynamics Logo"
        class="toolbar-logo"
      />
    }
    @if (!plainTitle) {
      <ion-title class="header-title" translate>{{ title }}</ion-title>
    }
    @if (plainTitle) {
      <ion-title class="header-title">{{ plainTitle }}</ion-title>
    }
    <!-- Optional extra content next to title (e.g., badges) -->
    <ng-content select="[header-title-extra]"></ng-content>
  </div>
  <ion-buttons slot="end" class="toolbar-buttons">
    <!-- Custom end content projection (left of avatar/login) -->
    <ng-content select="[header-end]"></ng-content>

    <div class="auth-area">
      @if (authUser$ | async; as authUser) {
        <ion-avatar class="padded-avatar" (click)="presentPopover($event)">
          <img [src]="image$ | async" alt="User Avatar" />
        </ion-avatar>
      } @else {
        <ion-button
          routerLink="/auth/login"
          color="primary"
          fill="outline"
          translate
        >
          common.login
        </ion-button>
        <ion-button
          routerLink="/auth/signup"
          color="primary"
          fill="solid"
          translate
        >
          common.signup
        </ion-button>
      }
    </div>
  </ion-buttons>
</ion-toolbar>
