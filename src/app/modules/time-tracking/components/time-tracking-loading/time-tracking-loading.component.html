<!-- Time Tracking Loading Component -->
@if (isLoading) {
  <!-- Overlay Mode - Used when loading over existing content -->
  @if (mode === 'overlay') {
    <div class="loading-overlay">
      <div class="loading-content">
        <ion-spinner [name]="spinnerName" [color]="spinnerColor"></ion-spinner>
        @if (message) {
          <p>{{ message | translate }}</p>
        }
      </div>
    </div>
  }
  <!-- Inline Mode - Used for initial loading / empty state -->
  @if (mode === 'inline') {
    <div class="loading-inline">
      <ion-spinner [name]="spinnerName" [color]="spinnerColor"></ion-spinner>
      @if (message) {
        <p>{{ message | translate }}</p>
      }
    </div>
  }
  <!-- Skeleton Mode - Placeholder content while loading -->
  @if (mode === 'skeleton') {
    <div class="loading-skeleton">
      @for (item of [].constructor(skeletonCount); track item) {
        <div
          class="skeleton-item"
          >
          <div class="skeleton-header">
            <ion-skeleton-text
              [animated]="true"
              style="width: 40%"
            ></ion-skeleton-text>
            <ion-skeleton-text
              [animated]="true"
              style="width: 20%"
            ></ion-skeleton-text>
          </div>
          <div class="skeleton-body">
            <ion-skeleton-text
              [animated]="true"
              style="width: 100%"
            ></ion-skeleton-text>
            <ion-skeleton-text
              [animated]="true"
              style="width: 80%"
            ></ion-skeleton-text>
          </div>
          <div class="skeleton-footer">
            <ion-skeleton-text
              [animated]="true"
              style="width: 30%"
            ></ion-skeleton-text>
          </div>
        </div>
      }
    </div>
  }
}
